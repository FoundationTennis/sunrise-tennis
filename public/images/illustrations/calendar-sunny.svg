<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Calendar body -->
  <rect x="45" y="40" width="110" height="95" rx="10" fill="white" stroke="#2B5EA7" stroke-width="2" opacity="0.9"/>
  <!-- Header bar -->
  <rect x="45" y="40" width="110" height="28" rx="10" fill="#2B5EA7" opacity="0.15"/>
  <rect x="45" y="58" width="110" height="10" fill="#2B5EA7" opacity="0.15"/>
  <!-- Calendar hooks -->
  <rect x="72" y="33" width="6" height="16" rx="3" fill="#2B5EA7" opacity="0.5"/>
  <rect x="122" y="33" width="6" height="16" rx="3" fill="#2B5EA7" opacity="0.5"/>
  <!-- Day labels -->
  <text x="60" y="55" font-size="7" fill="#2B5EA7" font-family="sans-serif" opacity="0.6">M</text>
  <text x="75" y="55" font-size="7" fill="#2B5EA7" font-family="sans-serif" opacity="0.6">T</text>
  <text x="90" y="55" font-size="7" fill="#2B5EA7" font-family="sans-serif" opacity="0.6">W</text>
  <text x="105" y="55" font-size="7" fill="#2B5EA7" font-family="sans-serif" opacity="0.6">T</text>
  <text x="120" y="55" font-size="7" fill="#2B5EA7" font-family="sans-serif" opacity="0.6">F</text>
  <text x="135" y="55" font-size="7" fill="#2B5EA7" font-family="sans-serif" opacity="0.6">S</text>
  <!-- Grid dots (representing days) -->
  <circle cx="62" cy="78" r="4" fill="#F5EDE4"/>
  <circle cx="78" cy="78" r="4" fill="#F5EDE4"/>
  <circle cx="94" cy="78" r="4" fill="#E87450" opacity="0.3"/>
  <circle cx="110" cy="78" r="4" fill="#F5EDE4"/>
  <circle cx="126" cy="78" r="4" fill="#2B5EA7" opacity="0.2"/>
  <circle cx="138" cy="78" r="4" fill="#F5EDE4"/>
  <circle cx="62" cy="95" r="4" fill="#2B5EA7" opacity="0.2"/>
  <circle cx="78" cy="95" r="4" fill="#F5EDE4"/>
  <circle cx="94" cy="95" r="4" fill="#F5EDE4"/>
  <circle cx="110" cy="95" r="4" fill="#E87450" opacity="0.3"/>
  <circle cx="126" cy="95" r="4" fill="#F5EDE4"/>
  <circle cx="138" cy="95" r="4" fill="#F5EDE4"/>
  <circle cx="62" cy="112" r="4" fill="#F5EDE4"/>
  <circle cx="78" cy="112" r="4" fill="#2B5EA7" opacity="0.2"/>
  <circle cx="94" cy="112" r="4" fill="#F5EDE4"/>
  <circle cx="110" cy="112" r="4" fill="#F5EDE4"/>
  <circle cx="126" cy="112" r="4" fill="#E87450" opacity="0.3"/>
  <circle cx="138" cy="112" r="4" fill="#F5EDE4"/>
  <!-- Sun poking from top right -->
  <circle cx="170" cy="20" r="20" fill="#F7CD5D" opacity="0.6"/>
  <circle cx="170" cy="20" r="13" fill="#F5B041" opacity="0.8"/>
  <!-- Rays -->
  <line x1="170" y1="0" x2="170" y2="4" stroke="#F7CD5D" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="188" y1="12" x2="192" y2="8" stroke="#F7CD5D" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="192" y1="28" x2="196" y2="28" stroke="#F7CD5D" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>

  <!-- ZZZ (quiet) -->
  <text x="145" y="75" font-size="12" fill="#6480A4" font-family="sans-serif" font-weight="bold" opacity="0.3">z</text>
  <text x="152" y="67" font-size="10" fill="#6480A4" font-family="sans-serif" font-weight="bold" opacity="0.25">z</text>
  <text x="157" y="60" font-size="8" fill="#6480A4" font-family="sans-serif" font-weight="bold" opacity="0.2">z</text>
